<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đọc truyện — Có Một Quả Chanh Be Bé</title>
<!-- FIX (1)(3): Load đầy đủ các font có hỗ trợ tiếng Việt -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Nunito:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef5ec; --text:#1a2e1a; --muted:#7a9478;
  --gold:#5a8a4a; --border:#c8ddc4;
  --bar:#e4f0e1; --fs:19px; --lh:2; --cw:680px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Lora','Times New Roman',serif;
  min-height:100vh; transition:background .3s,color .3s;
  -webkit-user-select:none; -moz-user-select:none; user-select:none;
}
/* WATERMARK */
body::after{
  content:attr(data-wm);
  position:fixed; inset:0;
  font-size:1.1rem; color:rgba(90,138,74,0.055);
  display:flex; align-items:center; justify-content:center;
  text-align:center; letter-spacing:10px;
  transform:rotate(-25deg) scale(3);
  pointer-events:none; z-index:9999;
  white-space:pre; user-select:none; overflow:hidden;
  font-family:'Nunito',sans-serif; font-weight:600;
}
/* THEMES */
body.t-green {--bg:#eef5ec;--text:#1a2e1a;--bar:#e4f0e1;--border:#c8ddc4;--muted:#7a9478;--gold:#5a8a4a;}
body.t-day   {--bg:#faf7f2;--text:#1a1510;--bar:#f5f0e8;--border:#e2dbd0;--muted:#9a8f82;--gold:#b8843c;}
body.t-sepia {--bg:#f4edd8;--text:#3d2b1a;--bar:#ece4cd;--border:#d4c8a8;--muted:#9a7a58;--gold:#8a6030;}
body.t-dark  {--bg:#1a1610;--text:#e8dcc8;--bar:#120f0a;--border:#2e2820;--muted:#7a6e5e;--gold:#c8965a;}
body.t-night {--bg:#0d0d14;--text:#c0c8e8;--bar:#080810;--border:#1e1e30;--muted:#6070a0;--gold:#8090d0;}
body.t-ink   {--bg:#0a0a08;--text:#e0e0d8;--bar:#060604;--border:#1e1e18;--muted:#6a6a58;--gold:#c0b890;}
/* TOP BAR */
.bar{position:sticky;top:0;z-index:100;background:var(--bar);border-bottom:1px solid var(--border);display:flex;align-items:center;height:52px;padding:0 1.5rem;gap:.75rem;}
.bar-left{display:flex;align-items:center;gap:.75rem;flex:1;min-width:0;}
.back-lnk{font-size:.8rem;color:var(--gold);text-decoration:none;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;}
.bar-chap{font-size:.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Nunito',sans-serif;}
.bar-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.timer{font-size:.72rem;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:4px 12px;white-space:nowrap;font-variant-numeric:tabular-nums;transition:color .3s,border-color .3s;font-family:'Nunito',sans-serif;}
.timer.warn{color:#c07820;border-color:#c07820;}
.timer.danger{color:#c0392b;border-color:#c0392b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.icon-btn{width:34px;height:34px;border-radius:3px;background:none;border:1px solid var(--border);color:var(--muted);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{border-color:var(--gold);color:var(--gold);}
.icon-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(90,138,74,.08);}
/* SETTINGS DRAWER */
.drawer{position:fixed;top:52px;right:0;width:270px;background:var(--bar);border-left:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:0 0 0 10px;padding:1.25rem;z-index:99;transform:translateX(105%);transition:transform .25s;max-height:calc(100vh - 52px);overflow-y:auto;}
.drawer.on{transform:translateX(0);}
.ds{margin-bottom:1.1rem;}
.dl{font-size:.63rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;font-family:'Nunito',sans-serif;}
.dc{display:flex;flex-wrap:wrap;gap:.35rem;}
/* FIX (1)(3): mỗi nút font dùng chính font đó để preview */
.fnt-btn{padding:5px 11px;border:1px solid var(--border);border-radius:3px;font-size:.82rem;cursor:pointer;background:none;color:var(--muted);transition:all .15s;}
.fnt-btn:hover,.fnt-btn.on{border-color:var(--gold);color:var(--gold);}
.fnt-lora        {font-family:'Lora',serif;}
.fnt-cormorant   {font-family:'Cormorant Garamond',serif;}
.fnt-merriweather{font-family:'Merriweather',serif;}
.fnt-noto        {font-family:'Noto Serif',serif;}
.sz-row{display:flex;align-items:center;gap:.75rem;}
.sz-val{font-size:.82rem;color:var(--gold);min-width:38px;text-align:center;font-family:'Nunito',sans-serif;}
.sz-btn{width:28px;height:28px;border-radius:3px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.sz-btn:hover{border-color:var(--gold);color:var(--gold);}
.clr-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.clr-dot:hover,.clr-dot.on{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);}
.c-green{background:#eef5ec;border-color:#c8ddc4!important;}
.c-day{background:#faf7f2;}
.c-sepia{background:#f4edd8;}
.c-dark{background:#1a1610;}
.c-night{background:#0d0d14;}
.c-ink{background:#0a0a08;}
/* CONTENT */
.wrap{max-width:var(--cw);margin:0 auto;padding:3.5rem 1.5rem 7rem;}
.chap-head{text-align:center;margin-bottom:3.5rem;}
.story-sm{font-size:.68rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem;font-family:'Nunito',sans-serif;}
.chap-h{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:400;font-style:italic;line-height:1.2;margin-bottom:.75rem;}
.chap-byline{font-size:.78rem;color:var(--muted);font-family:'Nunito',sans-serif;}
.chap-byline strong{color:var(--gold);}
.ornament{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:2rem auto;}
.prose{font-size:var(--fs);line-height:var(--lh);}
.prose p{margin-bottom:1.4em;text-indent:2em;}
.prose p:first-child{text-indent:0;}
.prose p:first-child::first-letter{font-family:'Cormorant Garamond',serif;font-size:3.5em;font-weight:700;color:var(--gold);float:left;line-height:.75;margin:.05em .12em 0 0;}
.prose strong,.prose b{font-weight:700;}
.prose em,.prose i{font-style:italic;}
.prose h1,.prose h2,.prose h3{font-family:'Cormorant Garamond',serif;margin:1.5em 0 .5em;text-align:center;color:var(--gold);}
.prose h1{font-size:1.8em;}.prose h2{font-size:1.5em;}.prose h3{font-size:1.2em;}
.prose blockquote{border-left:3px solid var(--gold);padding:.5em 1.2em;margin:1.5em 0;font-style:italic;opacity:.8;}
.prose hr{border:none;border-top:1px solid var(--border);margin:2.5em auto;width:60%;}
.prose .separator{text-align:center;color:var(--gold);letter-spacing:8px;margin:2em 0;font-size:.9em;}
/* NAV */
.chap-nav{display:flex;justify-content:space-between;gap:1rem;margin-top:4rem;padding-top:2rem;border-top:1px solid var(--border);}
.nav-btn{flex:1;max-width:220px;padding:1rem 1.1rem;background:none;border:1px solid var(--border);border-radius:3px;cursor:pointer;color:var(--muted);font-family:'Nunito',sans-serif;transition:all .2s;text-align:left;}
.nav-btn.r{text-align:right;}
.nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-d{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:.25rem;}
.nav-t{font-size:.82rem;font-weight:600;}
/* EXPIRED OVERLAY */
.exp{position:fixed;inset:0;background:rgba(14,12,10,.95);backdrop-filter:blur(16px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.exp.on{display:flex;}
.exp-icon{font-size:3.5rem;margin-bottom:1.5rem;}
.exp-h{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--gold);margin-bottom:.75rem;}
.exp-p{color:#888;max-width:380px;line-height:1.75;margin-bottom:2rem;font-size:.9rem;font-family:'Nunito',sans-serif;}
.btn-gold{background:var(--gold);color:#fff;padding:11px 28px;border:none;border-radius:3px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .2s;}
.btn-gold:hover{opacity:.85;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body class="t-green" data-wm="">

<div class="bar">
  <div class="bar-left">
    <a href="#" id="backBtn" class="back-lnk">← Danh sách</a>
    <span class="bar-chap" id="barChap">Đang tải…</span>
  </div>
  <div class="bar-right">
    <div class="timer" id="timer">⏱ --:--</div>
    <button class="icon-btn" id="settBtn" onclick="toggleDrawer()" title="Cài đặt">⚙</button>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div class="drawer" id="drawer">
  <div class="ds">
    <div class="dl">Font chữ</div>
    <div class="dc">
      <!-- FIX (1)(3): 4 font đều hỗ trợ tiếng Việt tốt, preview bằng chính font đó -->
      <button class="fnt-btn fnt-lora on"         id="fb-lora"  onclick="setFont('Lora',this)">Lora</button>
      <button class="fnt-btn fnt-cormorant"        id="fb-corm"  onclick="setFont('Cormorant Garamond',this)">Cormorant</button>
      <button class="fnt-btn fnt-merriweather"     id="fb-merr"  onclick="setFont('Merriweather',this)">Merriweather</button>
      <button class="fnt-btn fnt-noto"             id="fb-noto"  onclick="setFont('Noto Serif',this)">Noto Serif</button>
    </div>
  </div>
  <div class="ds">
    <div class="dl">Cỡ chữ</div>
    <div class="sz-row">
      <button class="sz-btn" onclick="adjFs(-1)">−</button>
      <span class="sz-val" id="fsVal">19</span>
      <button class="sz-btn" onclick="adjFs(1)">+</button>
    </div>
  </div>
  <div class="ds">
    <div class="dl">Giãn dòng</div>
    <div class="sz-row">
      <button class="sz-btn" onclick="adjLh(-0.1)">−</button>
      <span class="sz-val" id="lhVal">2.0</span>
      <button class="sz-btn" onclick="adjLh(0.1)">+</button>
    </div>
  </div>
  <div class="ds">
    <div class="dl">Độ rộng</div>
    <div class="sz-row">
      <button class="sz-btn" onclick="adjCw(-40)">−</button>
      <span class="sz-val" id="cwVal">680</span>
      <button class="sz-btn" onclick="adjCw(40)">+</button>
    </div>
  </div>
  <div class="ds">
    <div class="dl">Màu nền</div>
    <div class="dc">
      <div class="clr-dot c-green on" onclick="setTheme('green',this)" title="Xanh lá"></div>
      <div class="clr-dot c-day"      onclick="setTheme('day',this)"   title="Ban ngày"></div>
      <div class="clr-dot c-sepia"    onclick="setTheme('sepia',this)" title="Sepia"></div>
      <div class="clr-dot c-dark"     onclick="setTheme('dark',this)"  title="Tối"></div>
      <div class="clr-dot c-night"    onclick="setTheme('night',this)" title="Đêm"></div>
      <div class="clr-dot c-ink"      onclick="setTheme('ink',this)"   title="Mực"></div>
    </div>
  </div>
</div>

<div class="wrap" id="wrap"><div style="text-align:center;padding:5rem;color:var(--muted)"><span class="spin"></span></div></div>

<!-- EXPIRED OVERLAY -->
<div class="exp" id="expOverlay">
  <div class="exp-icon">⏰</div>
  <div class="exp-h">Pass đã hết hạn</div>
  <p class="exp-p">Pass chỉ có hiệu lực 15 phút và chỉ dùng được cho 1 chương.<br>Vui lòng liên hệ để xin pass mới nhé!</p>
  <button class="btn-gold" onclick="goBack()">← Quay lại danh sách chương</button>
</div>

<script>
// ── MARKDOWN PARSER ────────────────────────────────────────────
function renderContent(raw) {
  if (!raw) return '<p>(Chưa có nội dung)</p>';
  const lines = raw.split('\n');
  let html = '', inPara = false;
  const fmt = s => s
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
    .replace(/__(.+?)__/g,          '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,          '<em>$1</em>')
    .replace(/_(.+?)_/g,            '<em>$1</em>')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
  const closePara = () => { if (inPara) { html += '</p>'; inPara = false; } };
  for (const line of lines) {
    const t = line.trim();
    if (!t) { closePara(); continue; }
    if (/^###\s/.test(t))      { closePara(); html += `<h3>${fmt(t.replace(/^###\s+/,''))}</h3>`; }
    else if (/^##\s/.test(t))  { closePara(); html += `<h2>${fmt(t.replace(/^##\s+/,''))}</h2>`; }
    else if (/^#\s/.test(t))   { closePara(); html += `<h1>${fmt(t.replace(/^#\s+/,''))}</h1>`; }
    else if (/^>/.test(t))     { closePara(); html += `<blockquote>${fmt(t.replace(/^>\s*/,''))}</blockquote>`; }
    else if (/^(-{3,}|\*{3,}|={3,})$/.test(t)) { closePara(); html += '<div class="separator">✦  ✦  ✦</div>'; }
    else { if (!inPara) { html += '<p>'; inPara = true; } else html += '<br>'; html += fmt(t); }
  }
  closePara();
  return html;
}

// ── STATE ──────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search);
const chapterId = parseInt(params.get('chapter'));
const storyId   = params.get('story');
let session, expiresAt, timerIv;

// FIX (1): load font preference từ localStorage
let fs    = +localStorage.getItem('r_fs')    || 19;
let lh    = +localStorage.getItem('r_lh')    || 2;
let cw    = +localStorage.getItem('r_cw')    || 680;
let theme =  localStorage.getItem('r_theme') || 'green';
let curFont = localStorage.getItem('r_fw') || 'Lora';

// ⚠ THAY URL NÀY bằng URL Web App của bạn sau khi deploy Apps Script
const API_URL = 'https://script.google.com/macros/s/AKfycbxEaCOR69GHfX-JUmz8MKuBCCiUXUoTa8X8aWde3elkYFLbANcFjyTDB2TlEdjGYlg5QA/exec';
function getApiUrl() { return API_URL; }
async function apiFetch(path, opts = {}) {
  const base = getApiUrl(); if (!base) return null;
  const token  = localStorage.getItem('token') || '';
  const method = opts.method || 'GET';
  const p = new URLSearchParams({ path, token, method,
    ...(opts.body ? { body: JSON.stringify(opts.body) } : {}) });
  const res  = await fetch(base + '?' + p.toString());
  const text = await res.text();
  try { return JSON.parse(text); } catch { return { error: text }; }
}

window.addEventListener('DOMContentLoaded', () => {
  applySettings();
  restoreFontBtn();

  // FIX (2): không cần hỏi API_URL lại — đã lưu từ index.html
  const raw = sessionStorage.getItem('readSession');
  if (!raw) { showExp(); return; }
  session = JSON.parse(raw);
  if (session.chapterId !== chapterId) { showExp(); return; }
  expiresAt = new Date(session.expiresAt);
  if (Date.now() >= expiresAt) { showExp(); return; }

  document.body.setAttribute('data-wm', (session.readerName + '  ').repeat(20));
  document.getElementById('backBtn').href = `story.html?id=${storyId}`;
  loadChapter();
  startTimer();
});

async function loadChapter() {
  try {
    const d = await apiFetch('read/verify', { method: 'POST', body: {
      reader_name: session.readerName,
      pass_code:   session.passCode,
      chapter_id:  chapterId
    }});
    if (!d || d.error) { showExp(); return; }
    renderChapter(d);
  } catch { showExp(); }
}

function renderChapter(d) {
  const c = d.chapter;
  document.title = `${c.title} — Có Một Quả Chanh Be Bé`;
  document.getElementById('barChap').textContent = `Chương ${c.chapter_number}: ${c.title}`;
  document.getElementById('wrap').innerHTML = `
    <div class="chap-head">
      <div class="story-sm">${c.story_title || ''}</div>
      <div class="chap-h">Chương ${c.chapter_number} — ${c.title}</div>
      <div class="chap-byline">
        ${c.word_count ? Number(c.word_count).toLocaleString() + ' từ · ' : ''}
        Đang đọc với tư cách: <strong>${d.reader_name}</strong>
      </div>
      <div class="ornament"></div>
    </div>
    <div class="prose" id="prose">${renderContent(c.content)}</div>
    <div class="chap-nav">
      <button class="nav-btn" ${!d.prev ? 'disabled' : ''} onclick="goChapter(${d.prev?.id})">
        <div class="nav-d">← Chương trước</div>
        <div class="nav-t">${d.prev ? `${d.prev.chapter_number}. ${d.prev.title}` : 'Đây là chương đầu'}</div>
      </button>
      <button class="nav-btn r" ${!d.next ? 'disabled' : ''} onclick="goChapter(${d.next?.id})">
        <div class="nav-d">Chương sau →</div>
        <div class="nav-t">${d.next ? `${d.next.chapter_number}. ${d.next.title}` : 'Chưa có chương mới'}</div>
      </button>
    </div>`;
  // re-apply font sau khi render
  document.getElementById('wrap').style.fontFamily = `'${curFont}','Times New Roman',serif`;
}

function goChapter(id) { if (!id) return; sessionStorage.removeItem('readSession'); location.href = `story.html?id=${storyId}`; }
function goBack()      { sessionStorage.removeItem('readSession'); location.href = `story.html?id=${storyId}`; }

// ── TIMER ──────────────────────────────────────────────────────
function startTimer() { updateTimer(); timerIv = setInterval(updateTimer, 1000); }
function updateTimer() {
  const rem = expiresAt - Date.now();
  const el  = document.getElementById('timer');
  if (rem <= 0) { clearInterval(timerIv); showExp(); return; }
  const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
  el.textContent = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer' + (rem < 60000 ? ' danger' : rem < 180000 ? ' warn' : '');
}
function showExp() {
  clearInterval(timerIv);
  const p = document.getElementById('prose');
  if (p) p.style.filter = 'blur(10px)';
  document.getElementById('expOverlay').classList.add('on');
}

// ── SETTINGS ──────────────────────────────────────────────────
function applySettings() {
  document.documentElement.style.setProperty('--fs', fs+'px');
  document.documentElement.style.setProperty('--lh', lh);
  document.documentElement.style.setProperty('--cw', cw+'px');
  document.getElementById('fsVal').textContent = fs;
  document.getElementById('lhVal').textContent = lh.toFixed(1);
  document.getElementById('cwVal').textContent = cw;
  document.body.className = 't-'+theme;
  if (session?.readerName) document.body.setAttribute('data-wm', (session.readerName+'  ').repeat(20));
  localStorage.setItem('r_fs',fs); localStorage.setItem('r_lh',lh);
  localStorage.setItem('r_cw',cw); localStorage.setItem('r_theme',theme);
}
function adjFs(d){fs=Math.max(13,Math.min(30,fs+d));applySettings();}
function adjLh(d){lh=Math.max(1.2,Math.min(3,+(lh+d).toFixed(1)));applySettings();}
function adjCw(d){cw=Math.max(400,Math.min(960,cw+d));applySettings();}

// FIX (1)(3): setFont áp dụng lên cả body và wrap
function setFont(f, btn) {
  curFont = f;
  document.body.style.fontFamily = `'${f}','Times New Roman',serif`;
  const wrap = document.getElementById('wrap');
  if (wrap) wrap.style.fontFamily = `'${f}','Times New Roman',serif`;
  document.querySelectorAll('.fnt-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  localStorage.setItem('r_fw', f);
}
// khôi phục font btn đúng khi load lại
function restoreFontBtn() {
  const map = {'Lora':'fb-lora','Cormorant Garamond':'fb-corm','Merriweather':'fb-merr','Noto Serif':'fb-noto'};
  const id = map[curFont];
  if (id) {
    document.querySelectorAll('.fnt-btn').forEach(b => b.classList.remove('on'));
    document.getElementById(id)?.classList.add('on');
  }
  document.body.style.fontFamily = `'${curFont}','Times New Roman',serif`;
}

function setTheme(t,dot){
  theme=t; applySettings();
  document.querySelectorAll('.clr-dot').forEach(d=>d.classList.remove('on'));
  dot.classList.add('on');
}
function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('on');
  document.getElementById('settBtn').classList.toggle('on');
}
document.addEventListener('click',e=>{
  const dr=document.getElementById('drawer'),sb=document.getElementById('settBtn');
  if(!dr.contains(e.target)&&!sb.contains(e.target)){dr.classList.remove('on');sb.classList.remove('on');}
});

// ── CHỐNG COPY / DEVTOOLS ────────────────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12') { e.preventDefault(); return; }
  if (e.ctrlKey && ['u','s','p'].includes(e.key.toLowerCase())) { e.preventDefault(); return; }
  if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) { e.preventDefault(); return; }
});
(function devtoolsBlock(){
  const threshold = 160;
  setInterval(()=>{
    if(window.outerWidth-window.innerWidth>threshold || window.outerHeight-window.innerHeight>threshold){
      document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888">🔒 Vui lòng đóng DevTools để tiếp tục đọc.</div>';
    }
  }, 1000);
})();
</script>
</body>
