<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết truyện — Có Một Quả Chanh Be Bé</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Nunito:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a2e1a;--paper:#eef5ec;--gold:#5a8a4a;--gold2:#6fa85d;--muted:#7a9478;--border:#c8ddc4;--card:#f4faf3;--red:#c0392b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Nunito',sans-serif;min-height:100vh;}
header{position:sticky;top:0;z-index:100;background:rgba(238,245,236,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 6vw;height:60px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--ink);text-decoration:none;}
.logo em{color:var(--gold);font-style:italic;}
.back{font-size:.82rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;font-family:'Nunito',sans-serif;}
.back:hover{color:var(--gold);}
.hero{padding:60px 6vw 50px;display:flex;gap:3rem;align-items:flex-start;flex-wrap:wrap;}
.cover-box{flex-shrink:0;width:190px;}
.cover-img{width:190px;aspect-ratio:3/4;border-radius:3px;object-fit:cover;border:1px solid var(--border);display:block;}
.cover-ph{width:190px;aspect-ratio:3/4;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:5rem;color:rgba(90,138,74,0.2);background:linear-gradient(135deg,#e8f5e4,#d4ecd0);}
.info-box{flex:1;min-width:200px;}
.genre-tag{font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;font-family:'Nunito',sans-serif;}
.story-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:600;line-height:1.1;margin-bottom:.4rem;}
.author-line{color:var(--muted);font-size:.85rem;margin-bottom:1rem;font-family:'Nunito',sans-serif;}
.desc{font-size:.88rem;line-height:1.8;color:var(--ink);opacity:.75;max-width:560px;margin-bottom:1.5rem;font-family:'Nunito',sans-serif;}
.stats{display:flex;gap:2.5rem;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold);}
.stat-lbl{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:'Nunito',sans-serif;}
.section{padding:0 6vw 80px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
.chap-list{display:flex;flex-direction:column;gap:.4rem;}
.chap-row{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem;background:var(--card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .2s;}
.chap-row:hover{border-color:var(--gold);transform:translateX(4px);}
.chap-left{display:flex;align-items:center;gap:1rem;}
.chap-num{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--gold);min-width:36px;}
.chap-title{font-size:.88rem;font-weight:600;font-family:'Nunito',sans-serif;}
.chap-meta{font-size:.72rem;color:var(--muted);margin-top:.15rem;font-family:'Nunito',sans-serif;}
.chap-lock{font-size:.75rem;color:var(--muted);font-family:'Nunito',sans-serif;}
.veil{position:fixed;inset:0;background:rgba(14,12,10,.65);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s;}
.veil.on{opacity:1;pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:2.5rem;width:100%;max-width:430px;transform:translateY(16px);transition:transform .25s;box-shadow:0 24px 60px rgba(0,0,0,.15);}
.veil.on .modal{transform:translateY(0);}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:.3rem;}
.modal-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;font-family:'Nunito',sans-serif;}
.field{margin-bottom:.9rem;}
.field label{display:block;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;font-family:'Nunito',sans-serif;font-weight:600;}
.field input{width:100%;border:1px solid var(--border);background:var(--paper);color:var(--ink);padding:9px 12px;border-radius:3px;font-family:'Nunito',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--gold);}
.pass-input{font-family:monospace!important;letter-spacing:3px!important;font-size:1rem!important;}
.hint{font-size:.72rem;color:var(--muted);margin-top:.4rem;font-style:italic;font-family:'Nunito',sans-serif;}
.row{display:flex;gap:.75rem;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 20px;border-radius:3px;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{background:var(--gold2);}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.err{color:var(--red);font-size:.78rem;margin-top:.4rem;display:none;font-family:'Nunito',sans-serif;}
.err.on{display:block;}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'Nunito',sans-serif;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
footer{border-top:1px solid var(--border);padding:2rem 6vw;text-align:center;font-size:.75rem;color:var(--muted);font-family:'Nunito',sans-serif;}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="logo">Có Một Quả Chanh <em>Be Bé</em></a>
  <a href="../index.html" class="back">← Trang chủ</a>
</header>

<div id="content"><div class="loading"><span class="spin"></span></div></div>

<!-- PASS MODAL -->
<div class="veil" id="passVeil">
  <div class="modal">
    <h2>🔐 Nhập mật khẩu</h2>
    <p class="modal-sub" id="passModalSub">Chương này được khoá. Nhập tên tài khoản và pass được cấp để đọc.</p>
    <div class="field">
      <label>Tên tài khoản của bạn</label>
      <input type="text" id="rName" placeholder="vd: toithichgayvl" autocomplete="off">
    </div>
    <div class="field">
      <label>Mật khẩu (15 phút)</label>
      <input type="text" id="rPass" class="pass-input" placeholder="- - - - - - - - - -" autocomplete="off" spellcheck="false">
      <div class="hint">⏱ Pass có hiệu lực 15 phút · Chỉ dùng được cho 1 chương</div>
    </div>
    <div class="err" id="passErr"></div>
    <div class="row" style="margin-top:1.25rem">
      <button class="btn btn-outline" onclick="close_('passVeil')">Huỷ</button>
      <button class="btn btn-gold" id="passBtn" style="flex:1" onclick="submitPass()">Vào đọc →</button>
    </div>
  </div>
</div>

<footer>© 2026 Có Một Quả Chanh Be Bé</footer>

<script>
const params   = new URLSearchParams(location.search);
const storyId  = params.get('id');
if (!storyId) location.href = '../index.html';

let pendingChapterId = null;

// ⚠ THAY URL NÀY bằng URL Web App của bạn sau khi deploy Apps Script
const API_URL = 'https://script.google.com/macros/s/AKfycbxEaCOR69GHfX-JUmz8MKuBCCiUXUoTa8X8aWde3elkYFLbANcFjyTDB2TlEdjGYlg5QA/exec';
function getApiUrl() { return API_URL; }

async function apiFetch(path, opts = {}) {
  const base = getApiUrl();
  if (!base) throw new Error('Chưa cấu hình API URL.');
  const token  = localStorage.getItem('token') || '';
  const method = opts.method || 'GET';
  const p = new URLSearchParams({ path, token, method,
    ...(opts.body ? { body: JSON.stringify(opts.body) } : {}) });
  const res  = await fetch(base + '?' + p.toString());
  const text = await res.text();
  try { return JSON.parse(text); } catch { return { error: text }; }
}

async function load() {
  try {
    const d = await apiFetch('stories/' + storyId);
    if (!d || d.error) throw new Error(d?.error || 'Lỗi');
    document.title = d.title + ' — Có Một Quả Chanh Be Bé';
    const hasCover = !!d.cover_url;
    document.getElementById('content').innerHTML = `
      <div class="hero">
        <div class="cover-box">
          ${hasCover
            ? `<img class="cover-img" src="${d.cover_url}" alt="${d.title}">`
            : `<div class="cover-ph">${(d.title||'柠')[0]}</div>`}
        </div>
        <div class="info-box">
          ${d.genre ? `<div class="genre-tag">📚 ${d.genre}</div>` : ''}
          <div class="story-title">${d.title}</div>
          <div class="author-line">Tác giả: <strong>${d.author || 'Khuyết danh'}</strong></div>
          ${d.description ? `<div class="desc">${d.description}</div>` : ''}
          <div class="stats">
            <div><div class="stat-num">${d.chapters.length}</div><div class="stat-lbl">Chương</div></div>
            <div><div class="stat-num">${d.status === 'completed' ? '✓' : '↻'}</div><div class="stat-lbl">${d.status === 'completed' ? 'Hoàn thành' : 'Đang ra'}</div></div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Danh sách chương (${d.chapters.length})</div>
        <div class="chap-list">
          ${d.chapters.length === 0
            ? '<div class="loading">Chưa có chương nào.</div>'
            : d.chapters.map(c => `
              <div class="chap-row" onclick="askPass(${c.id},'${c.title.replace(/'/g,"\\'")}',${c.chapter_number})">
                <div class="chap-left">
                  <div class="chap-num">${c.chapter_number}</div>
                  <div>
                    <div class="chap-title">${c.title}</div>
                    <div class="chap-meta">${c.word_count ? Number(c.word_count).toLocaleString() + ' từ · ' : ''}${fmtDate(c.created_at)}</div>
                  </div>
                </div>
                <div class="chap-lock">🔒 Cần pass</div>
              </div>`).join('')}
        </div>
      </div>`;
  } catch(ex) {
    document.getElementById('content').innerHTML = `<div class="loading">Không tìm thấy truyện. (${ex.message})</div>`;
  }
}

function askPass(cid, title, num) {
  pendingChapterId = cid;
  document.getElementById('passModalSub').textContent = `Chương ${num}: "${title}"`;
  document.getElementById('passErr').classList.remove('on');
  document.getElementById('rPass').value = '';
  open_('passVeil');
  setTimeout(() => {
    const rn = document.getElementById('rName');
    rn.value ? document.getElementById('rPass').focus() : rn.focus();
  }, 200);
}

async function submitPass() {
  const rName = document.getElementById('rName').value.trim();
  const rPass = document.getElementById('rPass').value.trim().toUpperCase();
  const errEl = document.getElementById('passErr');
  errEl.classList.remove('on');
  if (!rName || !rPass) { errEl.textContent = 'Vui lòng nhập đủ thông tin.'; errEl.classList.add('on'); return; }
  const btn = document.getElementById('passBtn');
  btn.textContent = 'Đang xác thực…'; btn.disabled = true;
  try {
    const d = await apiFetch('read/verify', { method: 'POST', body: { reader_name: rName, pass_code: rPass, chapter_id: pendingChapterId } });
    if (!d || d.error) throw new Error(d?.error || 'Pass không hợp lệ');
    sessionStorage.setItem('readSession', JSON.stringify({
      readerName: rName, passCode: rPass,
      chapterId: pendingChapterId, expiresAt: d.expires_at, storyId
    }));
    close_('passVeil');
    location.href = `read.html?chapter=${pendingChapterId}&story=${storyId}`;
  } catch (e) {
    errEl.textContent = e.message || 'Mật khẩu không hợp lệ hoặc đã hết hạn.';
    errEl.classList.add('on');
  } finally { btn.textContent = 'Vào đọc →'; btn.disabled = false; }
}
document.getElementById('rPass').addEventListener('keydown', e => { if (e.key === 'Enter') submitPass(); });

function open_(id)  { document.getElementById(id).classList.add('on'); }
function close_(id) { document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.veil').forEach(v => v.addEventListener('click', e => { if (e.target === v) v.classList.remove('on'); }));
function fmtDate(s) { if (!s) return ''; try { return new Date(s).toLocaleDateString('vi-VN'); } catch { return ''; } }

load();
</script>
</body>
</html>
